[build]
publish = "."
command = "echo Static deploy listo"

# Reemplaza REPLACE_WITH_BACKEND_DOMAIN por tu backend publico (Render/Railway/Fly).
# Ejemplo: https://trazo-api.onrender.com
[[redirects]]
from = "/api/*"
to = "https://trazo-api.onrender.com/api/:splat"
status = 200
force = true

[[redirects]]
from = "/uploads/*"
to = "https://trazo-api.onrender.com/uploads/:splat"
status = 200
force = true

[[redirects]]
from = "/oauth/*"
to = "https://trazo-api.onrender.com/oauth/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
